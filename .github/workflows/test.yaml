name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies  
        run: npm install
        working-directory: lerning-github

      - name: Run linter
        run: npm run lint

  test:
    name: Run Tests
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 21]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install
        working-directory: lerning-github

      - name: Run tests
        run: npm test
        working-directory: lerning-github

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Display coverage
        run: cat coverage/lcov.info || echo "No coverage file"